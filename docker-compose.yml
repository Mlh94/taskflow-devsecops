services:
  api:
    build: .
    image: taskflow:latest
    ports:
      - "5000-5005:5000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taskflow-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - taskflow-net

networks:
  taskflow-net:
    driver: bridge
